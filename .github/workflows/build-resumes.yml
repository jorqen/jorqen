name: Build And Deploy Pages

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "index.html"
      - "assets/**"
      - "resume/*.yaml"
      - "scripts/build_resume_formats.sh"
      - "scripts/generate_resume_outputs.py"
      - ".github/workflows/build-resumes.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-dejavu-core imagemagick libheif-plugin-aomenc librsvg2-bin
          python3 -m pip install --user babel jinja2 jsonschema python-docx reportlab pillow pyyaml

      - name: Generate resume files
        run: |
          ./scripts/build_resume_formats.sh
          rm -rf .build .git .github AGENTS.md scripts
          rm -f .gitignore resume/resume.yaml resume/resume.schema.yaml
          find . -name ".DS_Store" -delete
          # Disable Jekyll so GitHub Pages serves generated static files and assets as-is.
          touch .nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
