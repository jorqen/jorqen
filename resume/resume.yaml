strengths:
  title:
    en: "Professional Profile"
    ru: "Профессиональный профиль"
  subtitle:
    en: "Patterns that best describe my engineering style and career direction."
    ru: "Паттерны, которые лучше всего описывают мой инженерный стиль и карьерное направление."
  cards:
    - title:
        en: "Architecture through trade-offs"
        ru: "Архитектура через компромиссы"
      body:
        en: "I make architectural decisions through concrete trade-offs: latency, reliability, operational complexity, team capacity, and future change cost. I am comfortable choosing between Redis and PostgreSQL, gRPC and REST, or a broker-centered design and a broader microservice split."
        ru: "Я принимаю архитектурные решения через конкретные компромиссы: задержка, надежность, операционная сложность, возможности команды и стоимость будущих изменений. Мне комфортно выбирать между Redis и PostgreSQL, gRPC и REST, брокер-центричным дизайном и более широкой микросервисной декомпозицией."
    - title:
        en: "Product + infrastructure"
        ru: "Продукт + инфраструктура"
      body:
        en: "I have built both platform infrastructure and product backends: service mesh components, testing infrastructure, vehicle telemetry, retail pricing, crypto payments, utility billing, and administrative systems. This range helps me translate product needs into reliable service boundaries and production infrastructure."
        ru: "Я строил и платформенную инфраструктуру, и продуктовые backend-системы: service mesh-компоненты, тестовую инфраструктуру, телеметрию автомобиля, ценообразование в ритейле, криптоплатежи, коммунальный биллинг и административные системы. Этот диапазон помогает мне переводить продуктовые потребности в надежные границы сервисов и production-инфраструктуру."
    - title:
        en: "Mentoring and technical leadership"
        ru: "Менторство и техническое лидерство"
      body:
        en: "I mentor candidates and interns, explain system design and backend fundamentals, and turn feedback into concrete growth plans. I want my leadership path to stay grounded in hands-on engineering."
        ru: "Я менторю кандидатов и стажеров, объясняю system design и backend-базу и превращаю обратную связь в конкретные планы роста. Я хочу, чтобы мой путь в лидерство оставался связанным с практической инженерией."
    - title:
        en: "Fast ramp-up across stacks"
        ru: "Быстрое погружение в новые стеки"
      body:
        en: "I ramp up quickly in unfamiliar domains and technologies: Java, Go, Kubernetes/Istio, MQTT, crypto payments, retail systems, and vehicle telemetry. I use AI tools pragmatically for research, simple implementation tasks, tests, and refactoring, while keeping architecture and production-risk decisions under my own review."
        ru: "Я быстро вхожу в незнакомые домены и технологии: Java, Go, Kubernetes/Istio, MQTT, криптоплатежи, retail systems и телеметрию автомобиля. AI-инструменты прагматично использую для исследования, простых задач реализации, тестов и рефакторинга, при этом архитектуру и рискованные production-решения оставляю за собой."

