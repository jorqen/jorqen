  items:
    - icon: "atom.svg"
      company:
        en: "ATOM"
        ru: "АТОМ"
      role: "Senior Software Engineer"
      startDate: "2025-02"
      location:
        en: "Remote"
        ru: "Удаленно"
      summary:
        en: >-
          ATOM develops an electric-vehicle platform. In the communications and telemetry team, I build production backend services that keep vehicles securely connected to the cloud, integrate external clients, and support low-latency MQTT, gRPC, and API flows.
        ru: >-
          АТОМ развивает платформу электромобиля. В команде коммуникаций и телеметрии я строю production backend-сервисы, которые поддерживают защищенную связь автомобиля с облаком, интегрируют внешних клиентов и обеспечивают низколатентные MQTT, gRPC и API-сценарии.
      highlights:
        - en: "Independently drove requirements discovery for ambiguous and partially unrealistic low-latency vehicle-to-cloud communication: aligned with analysts, architects, and integration teams, identified feasible trade-offs, and brought the MVP scope to a state that could be documented in Confluence and used for development."
          ru: "Самостоятельно прояснил неоднозначные и частично нереалистичные требования к низколатентной связи автомобиля с облаком: синхронизировался с аналитиками, архитекторами и командами интеграций, выявил реалистичные компромиссы и довел объем MVP до состояния, в котором его можно было зафиксировать в Confluence и использовать в разработке."
        - en: "Influenced the final architecture by simplifying an over-split microservice concept into a cleaner broker-centered design."
          ru: "Повлиял на финальную архитектуру, упростив чрезмерно раздробленную микросервисную концепцию до более чистого брокер-центричного дизайна."
        - en: "Designed and co-developed an mTLS-secured MQTT broker based on Mochi MQTT, with Redis-backed session/state recovery for persistent vehicle-to-cloud communication and restart-safe operation."
          ru: "Спроектировал и совместно разработал MQTT-брокер на Mochi MQTT с mTLS-защитой и восстановлением сессий/состояния через Redis для постоянной связи автомобиля с облаком и безопасной работы после перезапусков."
        - en: "Built a high-load backend service that currently handles 70K+ requests per second with p99 latency below 50 ms and is designed to scale beyond current load."
          ru: "Реализовал высоконагруженный backend-сервис, который сейчас обрабатывает 70K+ запросов в секунду при p99 ниже 50 мс и спроектирован с запасом на рост нагрузки."
        - en: "Built production observability from scratch: metrics, logs, traces, dashboards, alerts, latency/throughput monitoring."
          ru: "С нуля построил production-наблюдаемость: metrics, logs, traces, dashboards, alerts, latency/throughput monitoring."
        - en: "After the team lost dedicated DevOps support, independently took over CI/CD and deployment setup: build pipelines, manifests/charts, and delivery automation."
          ru: "После ухода DevOps-инженера из команды самостоятельно занялся CI/CD и настройкой деплоя: build pipelines, manifests/charts и автоматизацией поставки."
        - en: "Hardened trusted connectivity with certificate-based mTLS client authentication and topic-level authorization."
          ru: "Усилил доверенную связь через mTLS-аутентификацию клиентов по сертификатам и авторизацию на уровне топиков."
      stack:
