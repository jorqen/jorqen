        ru: >-
          Sber Tech развивает Platform V, крупную корпоративную платформу. В команде Service Mesh & Platform Infrastructure я работал с сильно кастомизированным форком Istio и смежными Kubernetes-компонентами для управления рабочими нагрузками, контроля политик и платформенной интеграции.
      highlights:
        - en: "Restored the automated test suite in a heavily customized Istio fork and raised unit-test coverage to 80%, returning unit tests to daily development."
          ru: "Восстановил набор автотестов в сильно кастомизированном форке Istio и поднял покрытие юнит-тестами до 80%, вернув их в ежедневную разработку."
        - en: "Expanded integration tests to ~95% of critical functionality, moving defect detection before release instead of relying on later manual checks."
          ru: "Расширил интеграционные тесты до ~95% критического функционала, перенеся обнаружение дефектов на этап до релиза вместо поздних ручных проверок."
        - en: "Designed and built a Go integration-testing framework that provisioned isolated Kubernetes environments, ran suites in parallel, and generated Allure reports in CI."
          ru: "Спроектировал и реализовал Go-фреймворк интеграционного тестирования, который поднимал изолированные Kubernetes-окружения, запускал наборы тестов параллельно и генерировал Allure-отчёты в CI."
        - en: "Designed and implemented a custom Kubernetes resource for managing Istio control-plane/data-plane relationships; it was later presented internally as a target platform approach."
          ru: "Спроектировал и реализовал пользовательский ресурс Kubernetes для управления связями Istio control plane/data plane; позже его представили внутри компании как целевой платформенный подход."
        - en: "Repaired CI/CD pipelines and moved defect detection earlier in the development cycle for infrastructure changes."
          ru: "Починил CI/CD pipelines и перенёс обнаружение дефектов на более ранний этап разработки инфраструктурных изменений."
        - en: "Mentored ~10 School 21 interns on the framework and automation process, turning manual QA scenarios into scalable automated tests."
          ru: "Наставлял ~10 стажёров из Школы 21 по фреймворку и процессу автоматизации, переводя ручные QA-сценарии в масштабируемые автотесты."
