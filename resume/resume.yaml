preferences:
  title:
    en: "Additional Information"
    ru: "Дополнительная информация"
  items:
    - en: "I primarily see myself as a backend engineer and feel strongest in distributed systems, production infrastructure, and complex backend logic."
      ru: "Я в первую очередь вижу себя backend-инженером и сильнее всего чувствую себя в distributed systems, production infrastructure и сложной backend-логике."
    - en: "I currently write mostly Go, have Java backend experience, and actively use Python in personal projects."
      ru: "Сейчас я в основном пишу на Go, имею backend-опыт на Java и активно использую Python в личных проектах."
    - en: "I am comfortable in both product and platform teams: I can switch between latency-sensitive infrastructure and business-facing backend functionality."
      ru: "Мне комфортно и в продуктовых, и в платформенных командах: я умею переключаться между инфраструктурой, чувствительной к задержкам, и backend-функциональностью, которая ближе к бизнесу."
    - en: "I am especially useful when the problem is technically ambiguous: requirements need to be clarified, trade-offs made, and a production path chosen."
      ru: "Я особенно полезен там, где задача технически неоднозначна: нужно прояснить требования, выбрать компромиссы и определить путь к production."
    - en: "I adapt quickly to new domains, stacks, and tools, and use AI pragmatically to speed up research, routine implementation, tests, and refactoring."
      ru: "Я быстро адаптируюсь к новым доменам, стекам и инструментам, а AI прагматично использую, чтобы ускорять исследование, рутинную реализацию, тесты и рефакторинг."
    - en: "In the next 2-5 years, I want to grow into a tech lead and broader technical leadership role while remaining a deeply technical engineer."
      ru: "В ближайшие 2-5 лет хочу вырасти в роль техлида и технического лидера, оставаясь при этом глубоко техническим инженером."
    - en: "Russian is my native language; English is B2 / working proficiency, and I use it in work when needed."
      ru: "Русский - мой родной язык; английский - B2 / рабочий уровень, и я использую его в работе, когда это нужно."
    - en: "Outside work, I keep a steady routine around mentoring, cycling, swimming, gym training, and travel; Japan is one of the places I especially want to revisit."
      ru: "Вне работы я поддерживаю стабильную рутину вокруг менторства, велосипеда, плавания, тренировок в зале и путешествий; Япония - одно из мест, куда мне особенно хочется вернуться."

