        - en: "Optimized payment and reporting queries using EXPLAIN ANALYZE, cutting several heavy PostgreSQL queries from 10-30 seconds to near real time."
          ru: "Оптимизировал платежные и отчетные запросы через EXPLAIN ANALYZE, сократив несколько тяжелых PostgreSQL-запросов с 10-30 секунд до почти реального времени."
        - en: "Implemented a link-based payment service: created API flows that generated and stored payment links, integrated with the frontend payment form, and supported crypto/card payment scenarios."
          ru: "Реализовал сервис оплаты по ссылке: сделал API-сценарии для создания и хранения платежных ссылок, интегрировался с frontend-формой оплаты и поддержал сценарии оплаты криптовалютой или картой."
        - en: "Built core P2P exchange capabilities, including exchange-rate logic, service integrations, email notifications, and Telegram alerts."
          ru: "Реализовал ключевые возможности P2P-обмена, включая логику курсов, интеграции между сервисами, email-уведомления и Telegram-оповещения."
        - en: "Investigated and contained a critical currency-conversion incident, rolled back affected transactions, and then strengthened validation, observability, and release discipline to reduce recurrence risk."
          ru: "Разобрал и локализовал критический инцидент с конвертацией валют, откатил затронутые транзакции и затем усилил валидацию, наблюдаемость и дисциплину релизов, чтобы снизить риск повторения."
