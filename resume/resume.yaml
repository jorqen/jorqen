        - en: "Built REST APIs for admin and internal tools used to review prices, apply manual overrides, compare stores, inspect photo evidence, and coordinate corrective actions."
          ru: "Реализовал REST API для админки и внутренних инструментов, через которые проверяли цены, применяли ручные корректировки, сравнивали магазины, изучали фотоподтверждения и координировали корректирующие действия."
        - en: "Integrated web, email, SMS, and mobile notification flows and kept API contracts stable for frontend and mobile teams."
          ru: "Интегрировал уведомления через web, email, SMS и мобильные клиенты и поддерживал стабильные API-контракты для frontend- и mobile-команд."
        - en: "Covered critical pricing-control flows with backend automated tests around price updates, manual overrides, and data-processing paths."
          ru: "Покрыл критичные сценарии контроля цен backend-автотестами вокруг обновления цен, ручных корректировок и обработки данных."
