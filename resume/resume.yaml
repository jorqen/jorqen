    - icon: "atom.svg"
      company:
        en: "ATOM"
        ru: "АТОМ"
      role: "Senior Software Engineer"
      employmentType:
        en: "Employment contract"
        ru: "ТК РФ"
      startDate: "2025-02"
      location:
        en: "Remote"
        ru: "Удаленно"
      summary:
        en: >-
          ATOM develops an electric-vehicle platform. In the communications and telemetry team, I build production backend services that keep vehicles securely connected to the cloud, integrate external clients, and support low-latency MQTT, gRPC, and API flows.
        ru: >-
          АТОМ развивает платформу электромобиля. В команде коммуникаций и телеметрии я строю production backend-сервисы, которые поддерживают защищенную связь автомобиля с облаком, интегрируют внешних клиентов и обеспечивают низколатентные MQTT, gRPC и API-сценарии.
      highlights:
        - en: "Built a high-load backend service that handles 70K+ requests per second at p99 latency below 50 ms, with headroom to scale beyond current load."
          ru: "Реализовал высоконагруженный backend-сервис, который обрабатывает 70K+ запросов в секунду при p99 ниже 50 мс и имеет запас для роста сверх текущей нагрузки."
        - en: "Independently drove requirements discovery for ambiguous, initially infeasible low-latency vehicle-to-cloud communication: aligned analysts, architects, and integration teams, identified feasible trade-offs, and brought the MVP scope to a documented, build-ready state in Confluence."
          ru: "Самостоятельно проработал требования к неоднозначной, изначально невыполнимой низколатентной связи автомобиля с облаком: синхронизировал аналитиков, архитекторов и команды интеграций, нашёл реалистичные компромиссы и довёл объём MVP до задокументированного в Confluence, готового к разработке состояния."
        - en: "Designed and co-developed an mTLS-secured MQTT broker on Mochi MQTT with certificate-based client authentication, topic-level authorization, and Redis-backed session/state recovery for persistent, restart-safe vehicle-to-cloud communication."
          ru: "Спроектировал и совместно разработал MQTT-брокер на Mochi MQTT с mTLS, аутентификацией клиентов по сертификатам, авторизацией на уровне топиков и восстановлением сессий/состояния через Redis для постоянной и устойчивой к перезапускам связи автомобиля с облаком."
        - en: "Influenced the final architecture by simplifying an over-split microservice concept into a cleaner broker-centered design."
          ru: "Повлиял на финальную архитектуру, упростив чрезмерно раздробленную микросервисную концепцию до более чистого брокер-центричного дизайна."
        - en: "Built production observability from scratch: metrics, logs, traces, dashboards, alerts, and latency/throughput monitoring."
          ru: "С нуля построил production-наблюдаемость: metrics, logs, traces, dashboards, alerts и мониторинг latency/throughput."
        - en: "After the team lost dedicated DevOps support, took over CI/CD and deployment: build pipelines, manifests/charts, and delivery automation."
          ru: "После ухода DevOps-инженера взял на себя CI/CD и деплой: build pipelines, manifests/charts и автоматизацию поставки."
      stack:
