        - en: "Mentored ~10 School 21 interns on the framework and automation process, turning manual QA scenarios into scalable automated tests."
          ru: "Наставлял ~10 стажеров из Школы 21 по фреймворку и процессу автоматизации, переводя ручные QA-сценарии в масштабируемые автотесты."
        - en: "Designed and implemented a custom Kubernetes resource for managing Istio control-plane/data-plane relationships; the solution was later presented internally as a target platform approach."
          ru: "Спроектировал и реализовал пользовательский ресурс Kubernetes для управления связями Istio control plane/data plane; позже решение представили внутри компании как целевой платформенный подход."
