          ru: "Оптимизировал платёжные и отчётные запросы через EXPLAIN ANALYZE, сократив несколько тяжёлых PostgreSQL-запросов с 10-30 секунд до почти реального времени."
        - en: "Split a large monolithic backend into focused services and migrated part of internal communication from REST to gRPC, reducing latency and clarifying service boundaries."
          ru: "Разделил большой монолитный backend на сфокусированные сервисы и перевёл часть внутреннего взаимодействия с REST на gRPC, снизив задержку и прояснив границы сервисов."
        - en: "Investigated and contained a critical currency-conversion incident, rolled back affected transactions, and strengthened validation, observability, and release discipline to reduce recurrence risk."
          ru: "Разобрал и локализовал критический инцидент с конвертацией валют, откатил затронутые транзакции и усилил валидацию, наблюдаемость и дисциплину релизов, чтобы снизить риск повторения."
        - en: "Implemented a link-based payment service: API flows that generated and stored payment links, integrated with the frontend payment form, and supported crypto and card payments."
          ru: "Реализовал сервис оплаты по ссылке: API-сценарии для создания и хранения платёжных ссылок, интеграция с frontend-формой оплаты и поддержка оплаты криптовалютой или картой."
        - en: "Built core P2P exchange capabilities: exchange-rate logic, service integrations, email notifications, and Telegram alerts."
          ru: "Реализовал ключевые возможности P2P-обмена: логика курсов, интеграции между сервисами, email-уведомления и Telegram-оповещения."
