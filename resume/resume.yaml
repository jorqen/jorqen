        en: "Product + infrastructure"
        ru: "Продукт + инфраструктура"
      body:
        en: "I have built both platform infrastructure and product backends: service mesh components, testing infrastructure, vehicle telemetry, retail pricing, crypto payments, utility billing, and administrative systems. This range helps me translate product needs into reliable service boundaries and production infrastructure."
        ru: "Я строил и платформенную инфраструктуру, и продуктовые backend-системы: service mesh-компоненты, тестовую инфраструктуру, телеметрию автомобиля, ценообразование в ритейле, криптоплатежи, коммунальный биллинг и административные системы. Этот диапазон помогает мне переводить продуктовые потребности в надежные границы сервисов и production-инфраструктуру."
    - title:
        en: "Mentoring and technical leadership"
        ru: "Менторство и техническое лидерство"
      body:
        en: "I mentor interns and engineers, explain system design and backend fundamentals, and turn feedback into concrete growth plans. I want my path toward technical leadership to stay grounded in hands-on engineering."
        ru: "Я менторю стажёров и инженеров, объясняю system design и backend-базу и превращаю обратную связь в конкретные планы роста. Хочу, чтобы мой путь к техническому лидерству оставался связанным с практической инженерией."
    - title:
        en: "Fast ramp-up across stacks"
        ru: "Быстрое погружение в новые стеки"
      body:
        en: "I ramp up quickly in unfamiliar domains and technologies: Go, Kubernetes/Istio, MQTT, service mesh, crypto payments, retail systems, and vehicle telemetry. I use AI tools pragmatically for research, routine implementation, tests, and refactoring, while keeping architecture and production-risk decisions under my own review."
        ru: "Я быстро вхожу в незнакомые домены и технологии: Go, Kubernetes/Istio, MQTT, service mesh, криптоплатежи, retail systems и телеметрию автомобиля. AI-инструменты прагматично использую для исследования, рутинной реализации, тестов и рефакторинга, при этом архитектуру и рискованные production-решения оставляю за собой."

