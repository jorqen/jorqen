person:
  name:
    en: "Matvey Sizov"
    ru: "Матвей Сизов"
  headline: "Backend Developer / Software Engineer"
  role:
    en: "Backend engineer with 4+ years building production systems | vehicle telemetry, service mesh infrastructure, low-latency services and secure APIs | >70K RPS, p99 <50 ms"
    ru: "Backend-инженер с 4+ годами опыта в production-системах | автомобильная телеметрия, service mesh-инфраструктура, low-latency services and secure APIs | >70K RPS, p99 <50 мс"
  summary:
    en: >-
      Backend Software Engineer focused on distributed systems, production infrastructure, and complex backend logic. I have 4+ years of commercial experience across electric-vehicle telemetry, service mesh, retail pricing, crypto payments, utility billing, and public digital services. I currently write mostly Go, have Java backend experience, and actively use Python in personal projects. I own backend work end to end: clarify ambiguous requirements, choose architecture through trade-offs, implement core services, add tests/observability/security, and ship through CI/CD.
    ru: >-
      Backend Software Engineer с фокусом на distributed systems, production-инфраструктуру и сложную backend-логику. У меня 4+ года коммерческого опыта в телеметрии электромобилей, service mesh, ценообразовании в ритейле, криптоплатежах, коммунальном биллинге и государственных цифровых сервисах. Сейчас я в основном пишу на Go, имею backend-опыт на Java и активно использую Python в личных проектах. Я веду backend-задачи end-to-end: проясняю неоднозначные требования, выбираю архитектуру через компромиссы, реализую ключевые сервисы, добавляю тесты/observability/security и довожу поставку через CI/CD.
  photo:
    src: "matvey-formal.png"
    position: "center 22%"
    filter: "brightness(0.99) contrast(1.02) saturate(0.96)"
    caption:
      en: "Formal portrait"
      ru: "Деловой портрет"
