<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, follow" />
    <link rel="canonical" href="https://jorqen.link/en/" />
    <link rel="alternate" hreflang="en" href="https://jorqen.link/en/" />
    <link rel="alternate" hreflang="ru" href="https://jorqen.link/ru/" />
    <link rel="alternate" hreflang="x-default" href="https://jorqen.link/en/" />
    <meta http-equiv="refresh" content="0; url=/en/" />
    <title>Matvey Sizov - Resume</title>
    <script>
      const pages = {"en": "/en/", "ru": "/ru/"};
      const fallback = "en";
      const lang = navigator.language?.toLowerCase().startsWith("ru") ? "ru" : fallback;
      window.location.replace(pages[lang] || pages[fallback]);
    </script>
  </head>
  <body>
    <p>
      <a href="/en/">EN</a> ·
      <a href="/ru/">RU</a>
    </p>
  </body>
</html>
